services:
  streamlit:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app
      - ~/.gcp:/root/.gcp

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
      - ~/.gcp:/root/.gcp